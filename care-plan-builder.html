<style>
  :root{
    --paper:#F3F5F2; --card:#FFFFFF;
    --ink:#1F2E29; --ink-soft:#5C6B65; --ink-faint:#64716B;
    --rule:#DDE3DE;
    --pine:#2F6B5E; --pine-soft:#E4EFEA; --mint:#EDF5F1;
    --amber:#855A08; --amber-soft:#FBF0D8; --amber-rule:#EBD9A8;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:"Public Sans",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:1060px; margin:0 auto; padding:40px 24px 80px}

  header.masthead{border-bottom:2px solid var(--ink); padding-bottom:18px; margin-bottom:14px}
  .eyebrow{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--pine)}
  h1{font-family:"Source Serif 4",Georgia,"Times New Roman",serif; font-weight:600; font-size:40px; line-height:1.08; margin:6px 0 10px}
  .sub{color:var(--ink-soft); width:100%; max-width:none; margin:0}
  .privacy{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11.5px; color:var(--ink-faint); margin:16px 0 0}
  .toolbar{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 26px}
  .welcome-copy{background:var(--mint); border:1px solid #C9DED7; border-radius:12px; padding:14px 16px; margin:0 0 18px}
  .welcome-copy p{margin:0; color:var(--ink-soft)}
  .welcome-copy p+p{margin-top:6px}
  .example-notice{background:var(--amber-soft); border:1px solid var(--amber-rule); color:var(--amber); border-radius:12px; padding:12px 14px; margin:0 0 22px; font-size:13px}

  button{font-family:inherit; font-size:14px; cursor:pointer; border-radius:var(--radius); transition:.15s}
  .btn{background:var(--card); border:1px solid var(--rule); color:var(--ink); padding:7px 13px}
  .btn:hover{border-color:var(--pine); color:var(--pine)}
  .btn-primary{background:var(--pine); border:1px solid var(--pine); color:#fff; padding:7px 13px}
  .btn-primary:hover{opacity:.88}
  .btn-ghost{background:none; border:none; color:var(--ink-faint); padding:2px 5px; font-size:12.5px}
  .btn-ghost:hover{color:var(--pine); text-decoration:underline}
  .btn-ghost.del:hover{color:#A33}
  button:focus-visible,input:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid var(--pine); outline-offset:2px}

  section.panel{background:var(--card); border:1px solid var(--rule); border-radius:14px; padding:22px 24px; margin-bottom:22px}
  .panel-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:4px}
  h2{font-family:"Source Serif 4",Georgia,"Times New Roman",serif; font-weight:600; font-size:21px; margin:0}
  .step{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11px; color:var(--ink-faint); letter-spacing:.1em}
  .hint{color:var(--ink-soft); font-size:13.5px; margin:2px 0 18px}

  .types{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px}
  .type{text-align:left; background:#FBFCFB; border:1px solid var(--rule); border-radius:12px;
    padding:13px 14px 12px; cursor:pointer; transition:.15s; color:var(--ink)}
  .type:hover{border-color:var(--pine)}
  .type[aria-pressed=true]{background:var(--pine-soft); border-color:var(--pine); box-shadow:inset 0 0 0 1px var(--pine)}
  .type .tn{font-family:"Source Serif 4",Georgia,"Times New Roman",serif; font-weight:600; font-size:16.5px; display:block; margin-bottom:2px; line-height:1.25}
  .type .td{font-size:12px; color:var(--ink-soft); line-height:1.4; display:block}

  label.f{display:block; font-size:12px; font-weight:600; letter-spacing:.03em; color:var(--ink-soft); margin-bottom:4px}
  input[type=text],select{font-family:inherit; font-size:14px; width:100%; padding:8px 10px;
    border:1px solid var(--rule); border-radius:var(--radius); background:#FBFCFB; color:var(--ink)}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end}
  .row > div{flex:1; min-width:130px}
  .editing{background:var(--amber-soft); border:1px solid var(--amber-rule); border-radius:12px; padding:14px}

  .daypick{display:flex; gap:5px; flex-wrap:wrap}
  .daypick label{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11px; letter-spacing:.04em;
    border:1px solid var(--rule); border-radius:6px; padding:6px 8px; cursor:pointer;
    background:#FBFCFB; color:var(--ink-soft); user-select:none}
  .daypick input{position:absolute; opacity:0; width:0; height:0}
  .daypick label:has(input:checked){background:var(--pine); border-color:var(--pine); color:#fff}
  .daypick label:has(input:focus-visible){outline:2px solid var(--pine); outline-offset:2px}
  .daypick label:has(input:disabled){opacity:.4; cursor:not-allowed}

  ul.list{list-style:none; padding:0; margin:0 0 16px}
  ul.list li{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--rule)}
  ul.list li:first-child{border-top:1px solid var(--rule)}
  .swatch{width:11px; height:11px; border-radius:3px; flex:none}
  .li-main{flex:1; min-width:0}
  .li-name{font-weight:600}
  .li-meta{font-size:12.5px; color:var(--ink-faint); font-family:"IBM Plex Mono",monospace}
  .empty{color:var(--ink-faint); font-size:14px; font-style:italic; padding:14px 0;
    border-top:1px dashed var(--rule); border-bottom:1px dashed var(--rule); margin-bottom:16px}

  .suggest{background:#FBFCFB; border:1px dashed var(--rule); border-radius:12px; padding:14px 16px; margin-bottom:18px}
  .suggest .cap{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-faint); margin:0 0 10px}
  .sugs{display:flex; flex-wrap:wrap; gap:6px}
  .sug{background:#fff; border:1px solid var(--rule); border-radius:20px; padding:5px 11px; font-size:13px; color:var(--ink)}
  .sug:hover{border-color:var(--pine); color:var(--pine)}
  .sug::before{content:"+ "; color:var(--ink-faint)}

  .plan-head{border-bottom:2px solid var(--ink); padding-bottom:10px; margin:46px 0 0}
  .everyday{border:1px solid var(--pine); background:var(--pine-soft); border-radius:14px; padding:16px 20px; margin:22px 0}
  .everyday .cap{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--pine); margin-bottom:10px}
  .everyday.ongoing{border:1px dashed var(--rule); background:#FBFCFB; margin-top:-8px}
  .everyday.ongoing .cap{color:var(--ink-soft)}
  .ribbon{display:flex; flex-wrap:wrap; gap:8px}
  .chip{background:#fff; border:1px solid var(--rule); border-radius:20px; padding:5px 12px; font-size:13px;
    display:flex; align-items:center; gap:7px}
  .chip .t{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11.5px; color:var(--ink-faint)}

  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:10px}
  .day{background:var(--card); border:1px solid var(--rule); border-radius:12px; padding:12px 11px; min-height:130px}
  .day h3{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-faint); margin:0 0 10px; padding-bottom:7px; border-bottom:1px solid var(--rule); font-weight:500}
  .task{border-left:3px solid var(--rule); padding:2px 0 2px 8px; margin-bottom:9px}
  .task .n{font-size:13px; font-weight:500; line-height:1.35}
  .task .m{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:10.5px; color:var(--ink-faint); display:block; margin-top:1px}
  .day .rest{font-size:12px; color:var(--ink-faint); font-style:italic}

  .flags{margin-top:22px}
  .flag{background:var(--amber-soft); border:1px solid var(--amber-rule); border-left:3px solid var(--amber);
    padding:11px 14px; margin-bottom:8px; font-size:13.5px; color:#5C4308}
  .flag b{color:var(--amber)}
  .flag a{color:inherit; font-weight:600; text-decoration:underline; cursor:pointer}
  .flag a:hover{color:var(--amber)}
  .flag.covered{background:var(--pine-soft); border-color:#C9DFD6; border-left-color:var(--pine); color:#2C4A40}
  .flag.covered b{color:var(--pine)}
  .ok{color:var(--pine); font-size:13.5px; background:var(--pine-soft); border:1px solid #C9DFD6;
    padding:11px 14px; border-radius:var(--radius)}

  .load{margin-top:34px}
  .bar{display:flex; align-items:center; gap:12px; margin-bottom:9px}
  .bar .who{width:170px; flex:none; font-size:13.5px; text-align:right; color:var(--ink-soft)}
  .bar .track{flex:1; background:#E8ECE9; border-radius:3px; height:14px; overflow:hidden}
  .bar .fill{display:block; height:100%; border-radius:3px}
  .bar .num{width:168px; flex:none; font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:12px; color:var(--ink-faint)}
  .bar-detail{margin:-4px 0 11px 182px; font-size:11.5px; color:var(--ink-faint); line-height:1.45}
  .load-note{font-size:13.5px; color:var(--ink-soft); margin-top:14px; width:100%; max-width:none}
  .load-method{display:block; font-size:12px; color:var(--ink-faint); margin-top:8px; width:100%; max-width:none}
  .availability{font-size:12.5px; color:var(--ink-soft); margin:8px 0 12px 182px}
  .standby-check{display:flex; gap:7px; align-items:flex-start; font-size:12.5px; color:var(--ink-soft); line-height:1.4; padding:7px 0}

  }

/* Workload estimates are deliberately simple and editable. "Points" are
   estimated minutes multiplied by the responsibility level. */
const DURATION_OPTIONS = [5,10,15,20,30,45,60,90,120,180];
const INTENSITY_MULTIPLIER = {routine:1, attention:1.25, demanding:1.5};
const WORK_CATEGORIES = ["direct","household","planning","medical","appointments","supervision","other"];
function suggestedEffort(source){
  const n = String(source && typeof source === "object" ? source.en : source || "").toLowerCase();
  if (/medicine|medication|prescription|pill|blood|oxygen|vitamin|doctor|nurs/.test(n)) return {minutes:15,intensity:"attention",category:"medical"};
  if (/clean|laundry|iron|cook|meal prep|vacuum|tidy|dish|shopping/.test(n)) return {minutes:60,intensity:"routine",category:"household"};
  if (/plan|order|grocery|budget|admin|list|schedule|coordinate/.test(n)) return {minutes:30,intensity:"attention",category:"planning"};
  if (/appointment|transport|therapy|physio|session/.test(n)) return {minutes:60,intensity:"attention",category:"appointments"};
  if (/supervis|respite|night|check-in|compan|break for/.test(n)) return {minutes:60,intensity:"attention",category:"supervision"};
  if (/feed|breakfast|lunch|dinner|bath|dress|toilet|routine|mobility|transfer|snack/.test(n)) return {minutes:30,intensity:"attention",category:"direct"};
  return {minutes:15,intensity:"routine",category:"other"};
}
function normaliseEffort(d, source){
  const fallback = suggestedEffort(source || d.name);
  d.minutes = DURATION_OPTIONS.includes(+d.minutes) ? +d.minutes : fallback.minutes;
  d.intensity = INTENSITY_MULTIPLIER[d.intensity] ? d.intensity : fallback.intensity;
  d.category = WORK_CATEGORIES.includes(d.category) ? d.category : fallback.category;
  return d;
}
function buildEffortOptions(){
  const minutes = document.getElementById("dMinutes"), intensity = document.getElementById("dIntensity"), category = document.getElementById("dCategory");
  if(!minutes || !intensity || !category) return;
  const keep = {minutes:minutes.value||"15", intensity:intensity.value||"routine", category:category.value||"other"};
  minutes.innerHTML = DURATION_OPTIONS.map(v=>`<option value="${v}">${t("duration")[v]}</option>`).join("");
  intensity.innerHTML = Object.keys(INTENSITY_MULTIPLIER).map(v=>`<option value="${v}">${t("intensity")[v]}</option>`).join("");
  category.innerHTML = WORK_CATEGORIES.map(v=>`<option value="${v}">${t("category")[v]}</option>`).join("");
  minutes.value=keep.minutes; intensity.value=keep.intensity; category.value=keep.category;
}

/* ---------- Dialogs (styled stand-ins for alert/confirm — no libraries,
   so the page keeps its no-network promise) ---------- */
function uiDialog(msg, isConfirm){
  return new Promise(resolve=>{
    const returnFocus=document.activeElement;
    const wrap = document.createElement("div");
    wrap.className = "modal-wrap";
    wrap.innerHTML = `<div class="modal" role="${isConfirm?"dialog":"alertdialog"}" aria-modal="true" aria-labelledby="cpb-dialog-title" aria-describedby="cpb-dialog-message">
      <div class="cap" id="cpb-dialog-title">${isConfirm ? t("modalConfirmCap") : t("modalNoteCap")}</div>
      <p id="cpb-dialog-message">${esc(msg)}</p>
      <div class="actions">
        ${isConfirm ? `<button class="btn" data-x="0">${t("cancel")}</button>` : ""}
        <button class="btn-primary" data-x="1">${t("ok")}</button>
      </div></div>`;
    const done = v => { wrap.remove(); document.removeEventListener("keydown", onKey);if(returnFocus&&typeof returnFocus.focus==="function")returnFocus.focus();resolve(v); };
    const onKey = e => {
      if (e.key === "Escape"){done(false);return}
      if(e.key!=="Tab")return;
      const buttons=[...wrap.querySelectorAll("[data-x]")];if(!buttons.length)return;
      const first=buttons[0],last=buttons[buttons.length-1];
      if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}
      else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}
    };
    wrap.addEventListener("click", e => {
      if (e.target === wrap){ done(false); return; }
      const b = e.target.closest("[data-x]");
      if (b) done(b.dataset.x === "1");
    });
    document.addEventListener("keydown", onKey);
    document.body.appendChild(wrap);
    wrap.querySelector(".btn-primary").focus();
  });
}
const uiAlert = m => uiDialog(m, false);
const uiConfirm = m => uiDialog(m, true);

function addParallelTranslations(fromNode,toNode,map){
  if(typeof fromNode==="string"&&typeof toNode==="string"){map.set(fromNode,toNode);return}
  if(!fromNode||!toNode||typeof fromNode!=="object"||typeof toNode!=="object")return;
  Object.keys(fromNode).forEach(key=>addParallelTranslations(fromNode[key],toNode[key],map));
}
function addBilingualTranslations(node,from,to,map,seen=new Set()){
  if(!node||typeof node!=="object"||seen.has(node))return;
  seen.add(node);
  if(typeof node[from]==="string"&&typeof node[to]==="string"){map.set(node[from],node[to]);return}
  Object.values(node).forEach(value=>addBilingualTranslations(value,from,to,map,seen));
}
function generatedTranslationMap(from,to,sources=[TYPES,BASICS,SUPPORT_STARTERS,EXAMPLE,EXAMPLE_SUPPORT,USER_ENTRY_GLOSSARY]){
  const map=new Map();
  addParallelTranslations(I18N[from],I18N[to],map);
  sources.forEach(source=>addBilingualTranslations(source,from,to,map));
  return map;
}
function matchEntryCase(source,target,from,to){
  const sourceLocale=from==="tr"?"tr-TR":"en-GB",targetLocale=to==="tr"?"tr-TR":"en-GB";
  const letters=String(source).match(/\p{L}/gu)||[];
  if(letters.length&&letters.every(letter=>letter===letter.toLocaleUpperCase(sourceLocale)))return String(target).toLocaleUpperCase(targetLocale);
  const first=String(source).match(/\p{L}/u)?.[0];
  if(first&&first===first.toLocaleLowerCase(sourceLocale))return String(target).replace(/\p{L}/u,letter=>letter.toLocaleLowerCase(targetLocale));
  return target;
}
function translateMappedText(map,value,from,to){
  if(typeof value!=="string"||!value)return value;
  if(map.has(value))return map.get(value);
  const fromLocale=from==="tr"?"tr-TR":"en-GB";
  const folded=new Map([...map].filter(([key])=>typeof key==="string").map(([key,target])=>[key.toLocaleLowerCase(fromLocale),target]));
  const translatePart=part=>{
    const exact=folded.get(part.toLocaleLowerCase(fromLocale));
    if(exact!==undefined)return matchEntryCase(part,exact,from,to);
    return part.replace(/\p{L}+(?:[’'-]\p{L}+)*/gu,word=>{
      const translated=folded.get(word.toLocaleLowerCase(fromLocale));
      return translated===undefined?word:matchEntryCase(word,translated,from,to);
    });
  };
  return value.split(/(\s*[,;]\s*)/).map((part,index)=>index%2?part:translatePart(part)).join("");
}
function translateGeneratedState(from,to){
  const careMap=generatedTranslationMap(from,to,[TYPES,BASICS,EXAMPLE,USER_ENTRY_GLOSSARY]);
  const supportMap=generatedTranslationMap(from,to,[SUPPORT_STARTERS,EXAMPLE_SUPPORT,USER_ENTRY_GLOSSARY]);
  const translated=(map,value)=>translateMappedText(map,value,from,to);
  state.recipient=translated(careMap,state.recipient);
  state.roles.forEach(role=>{role.name=translated(careMap,role.name);role.note=translated(careMap,role.note)});
  state.duties.forEach(duty=>{duty.name=translated(careMap,duty.name)});
  (state.shopping||[]).forEach(category=>{
    category.name=translated(supportMap,category.name);
    (category.items||[]).forEach(item=>{item.name=translated(supportMap,item.name);item.source=translated(supportMap,item.source)});
  });
  (state.meals||[]).forEach(meal=>{
    meal.name=translated(supportMap,meal.name);meal.ingredients=translated(supportMap,meal.ingredients);meal.notes=translated(supportMap,meal.notes);
  });
  (state.measurements||[]).forEach(table=>{
    table.name=translated(supportMap,table.name);
    (table.columns||[]).forEach(column=>{column.label=translated(supportMap,column.label)});
  });
  ["rName","rNote","dName"].forEach(id=>{
    const input=document.getElementById(id);if(input)input.value=translated(careMap,input.value);
  });
  ["shopItem","shopSource","mealName","mealIngredients","mealNotes","measurementName"].forEach(id=>{
    const input=document.getElementById(id);if(input)input.value=translated(supportMap,input.value);
  });
  const categorySelect=document.getElementById("shopCategory");
  if(categorySelect&&categorySelect.value&&categorySelect.value!=="__new__")categorySelect.dataset.nextValue=translated(supportMap,categorySelect.value);
  const recipient=document.getElementById("recip");if(recipient)recipient.value=state.recipient;
}
function toggleLang(){
  const from=lang,to=lang === "en" ? "tr" : "en";
  translateGeneratedState(from,to);
  lang=to;
  buildTypes();
  buildDayPicks();
  applyStatic();
  if (!builderStarted){
    setBuilderStarted(false);
  } else {
    render();
  }
}

async function chooseType(key,relangOnly=false){
  if(!relangOnly&&builderStarted){
    if(state.type===key&&autoContent==="type")return;
    if(hasPlanContent()&&!(await uiConfirm(t("confirmSwitch"))))return;
  }
  const ty = TYPES[key];
  uid = 1;
  state = { type:key, customLabel:"", recipient:L(ty.recipient),
    roles:ty.roles.map((r,i)=>({id:uid++, tpl:i, name:L(r.name), person:"", off:[...r.off], note:"", standby:false, color:PALETTE[i%PALETTE.length]})),
    duties:[], ...emptySupport() };
  document.getElementById("recip").value = state.recipient;
  document.getElementById("customLabel").value = "";
  autoContent = "type";
  setBuilderStarted(true);
  configureSectionState("type");
  cancelRole(); cancelDuty(); cancelShoppingItemEdit(); cancelMealEdit(); render();
  if(!relangOnly)setTimeout(()=>document.getElementById("rolesSection").scrollIntoView({block:"start",behavior:"smooth"}),0);
}

function buildDayPicks(){
  const offSel = picked(".roff"), daySel = picked(".dday");
  const ev = document.getElementById("dEvery"), an = document.getElementById("dAsNeeded");
  const evOn = ev ? ev.checked : false, anOn = an ? an.checked : false;

  document.getElementById("rOff").innerHTML = ALL.map(i=>
    `<label><input type="checkbox" class="roff" value="${i}">${dS(i)}</label>`).join("");
  setChecks(".roff", offSel);

  document.getElementById("dDays").innerHTML =
    `<label><input type="checkbox" id="dEvery" onchange="toggleEvery(this.checked)">${t("everyDay")}</label>` +
    `<label><input type="checkbox" id="dAsNeeded" onchange="toggleAsNeeded(this.checked)">${t("asNeeded")}</label>` +
    ALL.map(i=>`<label><input type="checkbox" class="dday" value="${i}">${dS(i)}</label>`).join("");
  setChecks(".dday", daySel);
  document.getElementById("dEvery").checked = evOn;
  document.getElementById("dAsNeeded").checked = anOn;
  syncDayState();
}
function syncDayState(){
  const ev = document.getElementById("dEvery"), an = document.getElementById("dAsNeeded");
  const special = ev.checked || an.checked;
  document.querySelectorAll(".dday").forEach(c=>{ if(special) c.checked = false; c.disabled = special; });
  an.disabled = ev.checked;
  ev.disabled = an.checked;
}
function toggleEvery(on){ if(on) document.getElementById("dAsNeeded").checked = false; syncDayState(); }
function toggleAsNeeded(on){ if(on) document.getElementById("dEvery").checked = false; syncDayState(); }
function picked(sel){ return [...document.querySelectorAll(sel)].filter(c=>c.checked).map(c=>+c.value); }
function setChecks(sel, days){ document.querySelectorAll(sel).forEach(c=>{ c.checked = days.includes(+c.value); }); }

/* ---------- Roles ---------- */
function submitRole(){
  const name = document.getElementById("rName").value.trim();
  if(!name){ document.getElementById("rName").focus(); return; }
  const person = document.getElementById("rPerson").value.trim();
  const note = document.getElementById("rNote").value.trim();
  const standby = document.getElementById("rStandby").checked;
  const off = picked(".roff");
  if (editRole !== null){
    const r = roleOf(editRole);
    if (r){ r.name=name; r.person=person; r.off=off; r.note=note; r.standby=standby; }
  } else {
    state.roles.push({id:uid++, name, person, off, note, standby, color:PALETTE[state.roles.length % PALETTE.length]});
  }
  autoContent = null;
  cancelRole(); render();

function startEditRole(id){
  const r = roleOf(id); if(!r) return;
  editRole = id;
  document.getElementById("rName").value = r.name;

  document.getElementById("rNote").value = r.note || "";

  document.getElementById("rCancel").hidden = false;
  document.getElementById("roleForm").classList.add("editing");

function cancelRole(){
  editRole = null;
  document.getElementById("rName").value = "";

  document.getElementById("roleForm").classList.remove("editing");
}
async function removeRole(id){
  const r = roleOf(id); if(!r) return;
  const owned = state.duties.filter(d=>d.roleId===id).length;
  const message = owned ? t("confirmRemoveRole")(r.name, owned) : t("confirmRemoveRoleSimple")(r.name);
  if (!(await uiConfirm(message))) return;
  state.roles = state.roles.filter(x=>x.id!==id);
  state.duties.forEach(d=>{ if(d.roleId===id) d.roleId = null; if(d.coverId===id) d.coverId = null; });
  autoContent = null;
  if (editRole === id) cancelRole();
  render();
}

/* ---------- Duties ---------- */
async function submitDuty(){
  const name = document.getElementById("dName").value.trim();
  if(!name){ document.getElementById("dName").focus(); return; }
  const every = document.getElementById("dEvery").checked;
  const ongoing = document.getElementById("dAsNeeded").checked;
  const days = every ? ALL.slice() : (ongoing ? [] : picked(".dday"));
  if(!every && !ongoing && !days.length){ await uiAlert(t("alertPickDay")); return; }
  const rv = document.getElementById("dRole").value;
  const time = document.getElementById("dTime").value.trim();
  const cv = document.getElementById("dCover").value;
  const minutes = +document.getElementById("dMinutes").value || 15;
  const intensity = document.getElementById("dIntensity").value || "routine";
  const category = document.getElementById("dCategory").value || "other";
  if (editDuty !== null){
    const d = state.duties.find(x=>x.id===editDuty);
    if (d){ d.name=name; d.roleId = rv ? +rv : null; d.time=time; d.coverId = cv ? +cv : null; d.days=days; d.every=every; d.ongoing=ongoing; d.minutes=minutes; d.intensity=intensity; d.category=category; }
  } else {
    state.duties.push({id:uid++, name, roleId: rv ? +rv : null, time, coverId: cv ? +cv : null, days, every, ongoing, minutes, intensity, category});
  }
  autoContent = null;
  cancelDuty(); render();
}
function startEditDuty(id){
  const d = state.duties.find(x=>x.id===id); if(!d) return;
  editDuty = id;
  document.getElementById("dName").value = d.name;
  document.getElementById("dTime").value = d.time || "";
  document.getElementById("dCover").value = d.coverId ? String(d.coverId) : "";
  document.getElementById("dMinutes").value = String(d.minutes || 15);
  document.getElementById("dIntensity").value = d.intensity || "routine";
  document.getElementById("dCategory").value = d.category || "other";
  document.getElementById("dEvery").checked = !!d.every;
  document.getElementById("dAsNeeded").checked = !!d.ongoing;
  syncDayState();
  setChecks(".dday", (d.every || d.ongoing) ? [] : d.days);
  document.getElementById("dRole").value = d.roleId ? String(d.roleId) : "";
  document.getElementById("dSubmit").textContent = t("saveChanges");
  document.getElementById("dCancel").hidden = false;
  document.getElementById("dutyForm").classList.add("editing");
  document.getElementById("dName").focus();
}
function cancelDuty(){
  editDuty = null;
  document.getElementById("dName").value = "";
  document.getElementById("dTime").value = "";
  const cvSel = document.getElementById("dCover"); if(cvSel) cvSel.value = "";
  document.getElementById("dMinutes").value = "15";
  document.getElementById("dIntensity").value = "routine";
  document.getElementById("dCategory").value = "other";
  document.getElementById("dEvery").checked = false;
  document.getElementById("dAsNeeded").checked = false;
  syncDayState();
  setChecks(".dday", []);
  const sel = document.getElementById("dRole"); if(sel) sel.value = "";
  document.getElementById("dSubmit").textContent = t("addDuty");
  document.getElementById("dCancel").hidden = true;
  document.getElementById("dutyForm").classList.remove("editing");
}
async function removeDuty(id){
  const duty = state.duties.find(d=>d.id===id); if(!duty) return;
  if (!(await uiConfirm(t("confirmRemoveDuty")(duty.name)))) return;
  state.duties = state.duties.filter(d=>d.id!==id);
  autoContent = null;
  if (editDuty === id) cancelDuty();
  render();
}

function addFrom(list, i, prefix){
  const s = list[i]; if(!s) return;
  const role = (s.r === null || s.r === undefined) ? null : state.roles.find(r=>r.tpl===s.r);
  const cover = (s.cover === null || s.cover === undefined) ? null : state.roles.find(r=>r.tpl===s.cover);
  const effort = suggestedEffort(s.name);
  state.duties.push({id:uid++, name:L(s.name), roleId: role ? role.id : null,
    time:s.t||"", coverId:cover ? cover.id : null, days:s.days.slice(), every:!!s.every, ongoing:false, src:prefix+i,

    `<button class="sug" onclick="addSuggestion(${i})">${esc(L(s.name))}</button>`).join("");
  const bc = document.getElementById("basicsCap");
  bc.hidden = !bas.length;
  bc.style.marginTop = sugs.length ? "14px" : "0";
  document.getElementById("basics").innerHTML = bas.map(({s,i})=>
    `<button class="sug" onclick="addBasic(${i})">${esc(L(s.name))}</button>`).join("");

  document.getElementById("dutyList").innerHTML = state.duties.map(d=>{
    const r = roleOf(d.roleId), cr = roleOf(d.coverId);
    const when = d.every ? t("everyDayMeta") : d.ongoing ? t("asNeededMeta") : d.days.map(dS).join(" · ");
    const effort = `${t("duration")[d.minutes]} · ${t("intensity")[d.intensity]} · ${t("category")[d.category]}`;
    return `<li><span class="swatch" style="background:${r?r.color:"#CBD3CE"}"></span>
      <span class="li-main"><span class="li-name">${esc(d.name)}</span>
        <span class="li-meta">${when}${d.time?" — "+esc(d.time):""} — ${r?esc(r.name):t("unassigned").toLocaleLowerCase(lang==="tr"?"tr":"en")}${cr?` — ${t("coverMeta")(esc(cr.name))}`:""}<br>${effort}</span>
      </span>
      <button class="btn-ghost" onclick="startEditDuty(${d.id})">${t("edit")}</button>
      <button class="btn-ghost del" onclick="removeDuty(${d.id})">${t("remove")}</button></li>`;
  }).join("");
  document.getElementById("dutyEmpty").hidden = state.duties.length > 0;

  document.getElementById("planTitle").textContent =
    state.recipient ? t("planTitleFor")(state.recipient) : t("planTitleEmpty");

  const daily = state.duties.filter(d=>d.every).sort(byTime);
  document.getElementById("everyday").hidden = daily.length === 0;
  document.getElementById("ribbon").innerHTML = daily.map(d=>{
    const r = roleOf(d.roleId);
    return `<span class="chip"><span class="swatch" style="background:${r?r.color:"#CBD3CE"}"></span>${esc(d.name)}${d.time?`<span class="t">${esc(d.time)}</span>`:""}</span>`;
  }).join("");

  const ongoing = state.duties.filter(d=>d.ongoing);
  document.getElementById("ongoingBox").hidden = ongoing.length === 0;
  document.getElementById("ongoingRibbon").innerHTML = ongoing.map(d=>{
    const r = roleOf(d.roleId);
    return `<span class="chip"><span class="swatch" style="background:${r?r.color:"#CBD3CE"}"></span>${esc(d.name)}${r?`<span class="t">${esc(r.name)}</span>`:""}</span>`;
  }).join("");

  const gaps = [];
  document.getElementById("grid").innerHTML = ALL.map(i=>{
    const todays = state.duties.filter(x=>!x.every && !x.ongoing && x.days.includes(i)).sort(byTime);
    const body = todays.length ? todays.map(x=>{
      const r = roleOf(x.roleId), cr = roleOf(x.coverId);
      let mark = "", who = r ? esc(r.name) : t("unassigned").toLocaleLowerCase(lang==="tr"?"tr":"en");
      if(r && r.off.includes(i)){
        if (cr){
          gaps.push({html:t("gapOffCov")(dL(i), esc(x.name), esc(r.name), esc(cr.name)), covered:true});
          who = esc(cr.name);
        } else {
          gaps.push({html:t("gapOff")(dL(i), esc(x.name), esc(r.name), x.id), covered:false});
          mark = ` <span style="color:var(--amber)">⚑</span>`;
        }
      }
      if(!r) gaps.push({html:t("gapNobody")(dL(i), esc(x.name)), covered:false});
      return `<div class="task" style="border-left-color:${r?r.color:"#CBD3CE"}">
        <span class="n">${esc(x.name)}${mark}</span>
        <span class="m">${x.time?esc(x.time)+" · ":""}${who}</span></div>`;
    }).join("") : `<div class="rest">${t("restDay")}</div>`;
    return `<div class="day"><h3>${dS(i)}</h3>${body}</div>`;
  }).join("");

  daily.forEach(d=>{
    const r = roleOf(d.roleId), cr = roleOf(d.coverId);
    if (r && r.off.length){
      const away = r.off.map(dL).join(t("dayJoin"));
      if (cr) gaps.push({html:t("gapDailyOffCov")(esc(d.name), esc(r.name), away, esc(cr.name)), covered:true});
      else gaps.push({html:t("gapDailyOff")(esc(d.name), esc(r.name), away, d.id), covered:false});
    }
    if (!r) gaps.push({html:t("gapDailyNobody")(esc(d.name)), covered:false});
  });

  gaps.sort((a,b)=>a.covered-b.covered);
  const f = document.getElementById("flags");
  document.getElementById("coverageBox").hidden=!state.duties.length;
  f.innerHTML = !state.duties.length ? "" : (gaps.length
    ? gaps.map(g=>`<div class="flag${g.covered?" covered":""}">${g.html}</div>`).join("")
    : `<div class="ok">${t("noGaps")}</div>`);

  renderSupport();
  renderLoad();
  renderPrint();
}

function renderLoad(){
  const box = document.getElementById("loadBox");
  if(!state.duties.length){ box.hidden = true; return; }
  box.hidden = false;
  const buckets = new Map(state.roles.map(r=>[r.id,{
    id:r.id, name:r.name, color:r.color, points:0, minutes:0, categories:{}
  }]));
  const unassigned = {id:null, name:t("nobodyYet"), color:"#CBD3CE", points:0, minutes:0, categories:{}, nobody:true};
  const add = (roleId,d) => {
    const bucket = roleId && buckets.has(roleId) ? buckets.get(roleId) : unassigned;
    const minutes = +d.minutes || 15;
    const points = minutes * (INTENSITY_MULTIPLIER[d.intensity] || 1);
    bucket.minutes += minutes;
    bucket.points += points;
    bucket.categories[d.category] = (bucket.categories[d.category] || 0) + points;
  };

  state.duties.forEach(d=>{
    if(d.ongoing){
      // For an as-needed duty, the selected time is its typical weekly total.
      add(d.roleId,d);
      return;
    }
    d.days.forEach(day=>{
      const owner = roleOf(d.roleId);
      if(!owner){ add(null,d); return; }
      // A covered occurrence belongs to the person who actually does it.
      if(owner.off.includes(day)) add(d.coverId && roleOf(d.coverId) ? d.coverId : null,d);
      else add(owner.id,d);
    });
  });

  const counts = [...buckets.values()].filter(c=>c.points > 0);
  if (unassigned.points) counts.push(unassigned);
  if (!counts.length){ box.hidden = true; return; }

  const total = counts.reduce((s,c)=>s+c.points,0) || 1;
  const max = Math.max(...counts.map(c=>c.points), 1);
  counts.sort((a,b)=>b.points-a.points);

  document.getElementById("bars").innerHTML = counts.map(c=>{
    const share = Math.round(c.points/total*100);
    const detail = Object.entries(c.categories).sort((a,b)=>b[1]-a[1]).map(([key,value])=>
      `${esc(t("category")[key])} ${t("percent")(Math.round(value/c.points*100))}`).join(" · ");
    return `<div class="bar">
      <span class="who">${esc(c.name)}</span>
      <span class="track"><span class="fill" style="width:${(c.points/max*100).toFixed(1)}%; background:${c.color}"></span></span>
      <span class="num">${t("loadAmount")(share,t("estimatedTime")(c.minutes))}</span>
    </div><div class="bar-detail">${detail}</div>`;
  }).join("");

  const standbyRoles = state.roles.filter(r=>r.standby);
  const availability = document.getElementById("availability");
  availability.hidden = standbyRoles.length === 0;
  availability.textContent = standbyRoles.length ? t("availabilitySummary")(
    standbyRoles.map(r=>`${r.name} (${Math.max(0,7-r.off.length)} ${lang==="tr"?"gün/hafta":"days/week"})`).join(", ")
  ) : "";

  const top = counts[0];
  const share = Math.round(top.points / total * 100);
  const note = document.getElementById("loadNote");
  const roleCount = counts.filter(c=>!c.nobody).length;
  if (top.nobody){
    note.innerHTML = `${esc(t("loadNobody"))}<span class="load-method">${esc(t("loadMethod"))}</span>`;
  } else if (share >= 60){
    note.innerHTML = `${esc(t("loadHeavy")(top.name, share))}<span class="load-method">${esc(t("loadMethod"))}</span>`;
  } else {
    note.innerHTML = `${esc(t("loadSpread")(roleCount, top.name, share))}<span class="load-method">${esc(t("loadMethod"))}</span>`;
  }
}

function renderSupportPrint(){
  const sections=[];
  const current=allShopItems().filter(x=>x.item.status!=="stock");
  if(state.shopping.length){
    sections.push(`<section><h2>${t("printShopping")}</h2><h3>${t("currentListHead")}</h3>${current.length?`<table><thead><tr><th>${t("shopItemLabel")}</th><th>${t("shopCategoryLabel")}</th><th>${t("shopStatus").needed}</th></tr></thead><tbody>${current.map(({cat,item})=>`<tr><td>${esc(item.name)}</td><td>${esc(cat.name)}</td><td>${t("shopStatus")[item.status]}${item.source?` · ${esc(item.source)}`:""}</td></tr>`).join("")}</tbody></table>`:`<p>${t("emptyCurrent")}</p>`}<h3>${t("guideHead")}</h3><table><thead><tr><th>${t("shopCategoryLabel")}</th><th>${t("shopItemLabel")}</th><th>${t("shopSourceLabel")}</th></tr></thead><tbody>${state.shopping.flatMap(cat=>cat.items.map(item=>`<tr><td>${esc(cat.name)}</td><td>${esc(item.name)}</td><td>${esc(item.source||"")}</td></tr>`)).join("")}</tbody></table></section>`);
  }
  if(state.meals.length){
    const mealName=id=>{const m=state.meals.find(x=>x.id===id);return m?m.name:""};
    sections.push(`<section><h2>${t("printMeals")}</h2><h3>${t("mealLibraryHead")}</h3><table><thead><tr><th>${t("mealNameLabel")}</th><th>${t("ingredientsLabel")}</th><th>${t("mealNotesLabel")}</th></tr></thead><tbody>${state.meals.map(m=>`<tr><td>${esc(m.name)}</td><td>${esc(m.ingredients||"")}</td><td>${esc(m.notes||"")}</td></tr>`).join("")}</tbody></table><h3>${t("weeklyMealsHead")}</h3><table class="meal-plan-print"><thead><tr><th></th><th>${t("mealSlots").breakfast}</th><th>${t("mealSlots").lunch}</th><th>${t("mealSlots").dinner}</th></tr></thead><tbody>${ALL.map(day=>`<tr><th>${dL(day)}</th><td>${esc(mealName(state.mealPlan[day].breakfast))}</td><td>${esc(mealName(state.mealPlan[day].lunch))}</td><td>${esc(mealName(state.mealPlan[day].dinner))}</td></tr>`).join("")}</tbody></table></section>`);
  }
  if(state.measurements.length){
    sections.push(`<section><h2>${t("printMeasurements")}</h2>${state.measurements.map(table=>{const rows=table.rows.length?table.rows:Array.from({length:6},(_,i)=>({id:"blank"+i,values:{}}));return `<h3>${esc(table.name)}</h3><table><thead><tr>${table.columns.map(c=>`<th>${esc(c.label)}</th>`).join("")}</tr></thead><tbody>${rows.map(row=>`<tr>${table.columns.map(c=>`<td>${esc(row.values[c.id]||"")}&nbsp;</td>`).join("")}</tr>`).join("")}</tbody></table>${table.rows.length?"":`<p style="font-size:8pt;color:var(--ink-faint)">${t("blankMeasurementRows")}</p>`}`}).join("")}</section>`);
  }
  document.getElementById("supportPrint").innerHTML=sections.join("");
}

function renderPrint(){
  document.getElementById("pTitle").textContent =
    state.recipient ? t("planTitleFor")(state.recipient) : t("pTitleEmpty");
  const dated = new Date().toLocaleDateString(lang==="tr" ? "tr-TR" : "en-GB", {day:"numeric", month:"long", year:"numeric"});
  const kind = state.type === "other" && !state.customLabel ? "" : ` · ${typeName()}`;
  document.getElementById("pMeta").textContent = t("prepared")(dated) + kind;
  document.getElementById("pRoles").innerHTML = state.roles.map(r=>`
    <li><span class="swatch" style="background:${r.color}"></span>
      <span>${esc(r.name)}${r.person ? " — " + esc(r.person) : ""}
      ${r.off.length ? `<span class="off">${t("offMeta")(r.off.map(dS).join(", "))}</span>` : ""}
      ${r.note ? `<span class="off">${esc(r.note)}</span>` : ""}</span>
      ${r.standby ? `<span class="off">${t("standbyMeta")(Math.max(0,7-r.off.length))}</span>` : ""}
    </li>`).join("");
  renderSupportPrint();
}

async function printPlan(){
  if (!state.duties.length && !state.shopping.length && !state.meals.length && !state.measurements.length){ await uiAlert(t("alertNothing")); return; }
  const sectionState=collapsibleSections().map(details=>[details.id,details.open]);
  try{
    sectionState.forEach(([id])=>setSectionOpen(id,true));
    renderPrint();
    window.print();
  }finally{
    sectionState.forEach(([id,open])=>setSectionOpen(id,open));
  }
}

/* ---------- Backup file (the only way a plan leaves this page) ---------- */
const BACKUP_LIMITS = Object.freeze({
  maxBytes:2*1024*1024, maxText:500, maxNotes:4000,
  maxRoles:100, maxDuties:2000, maxCategories:200, maxShoppingItems:5000,
  maxMeals:1000, maxTables:100, maxColumns:50, maxRows:5000, maxTableRows:2000
});
const isBackupRecord = value => !!value && typeof value === "object" && !Array.isArray(value);
function backupFailure(){throw new Error("invalid backup")}
function backupArray(value,max,optional=false){
  if(value===undefined&&optional)return [];
  if(!Array.isArray(value)||value.length>max)backupFailure();
  return value;
}
function backupText(value,max=BACKUP_LIMITS.maxText,required=false){
  if(value===undefined||value===null)value="";
  if(typeof value!=="string"||value.length>max||(required&&!value.trim()))backupFailure();
  return value;
}
function backupBoolean(value){
  if(value===undefined)return false;
  if(typeof value!=="boolean")backupFailure();
  return value;
}
function backupId(value){
  if(!Number.isSafeInteger(value)||value<1)backupFailure();
  return value;
}
function backupDays(value){
  const days=backupArray(value===undefined?[]:value,7);
  if(days.some(day=>!Number.isInteger(day)||!ALL.includes(day)))backupFailure();
  return [...new Set(days)];
}
function backupReference(value,map){
  if(value===undefined||value===null||value==="")return null;
  return map.get(backupId(value))||null;
}
function sanitizeBackupState(raw){
  if(!isBackupRecord(raw))backupFailure();
  let nextId=1, shoppingItemCount=0, measurementRowCount=0;
  const freshId=()=>nextId++;

  const roleMap=new Map(), roleNames=new Map();
  const roles=backupArray(raw.roles,BACKUP_LIMITS.maxRoles).map((item,index)=>{
    if(!isBackupRecord(item))backupFailure();
    const oldId=backupId(item.id);if(roleMap.has(oldId))backupFailure();
    const id=freshId(),name=backupText(item.name,BACKUP_LIMITS.maxText,true);
    roleMap.set(oldId,id);roleNames.set(name,id);
    const color=typeof item.color==="string"&&PALETTE.includes(item.color)?item.color:PALETTE[index%PALETTE.length];
    return {id,name,person:backupText(item.person),off:backupDays(item.off),note:backupText(item.note,BACKUP_LIMITS.maxNotes),standby:backupBoolean(item.standby),color};
  });

  const duties=backupArray(raw.duties,BACKUP_LIMITS.maxDuties).map(item=>{
    if(!isBackupRecord(item))backupFailure();backupId(item.id);
    const name=backupText(item.name,BACKUP_LIMITS.maxText,true);
    const every=backupBoolean(item.every),ongoing=backupBoolean(item.ongoing);if(every&&ongoing)backupFailure();
    let coverId;
    if(item.coverId===undefined){
      const legacy=backupText(item.cover,BACKUP_LIMITS.maxText);
      coverId=legacy?[...roleNames].find(([roleName])=>legacy.indexOf(roleName)===0)?.[1]||null:null;
    }else coverId=backupReference(item.coverId,roleMap);
    if(item.minutes!==undefined&&(!Number.isFinite(item.minutes)||!DURATION_OPTIONS.includes(item.minutes)))backupFailure();
    if(item.intensity!==undefined&&!Object.hasOwn(INTENSITY_MULTIPLIER,item.intensity))backupFailure();
    if(item.category!==undefined&&!WORK_CATEGORIES.includes(item.category))backupFailure();
    const duty={id:freshId(),name,roleId:backupReference(item.roleId,roleMap),coverId,time:backupText(item.time,100),days:backupDays(item.days),every,ongoing,
      minutes:item.minutes,intensity:item.intensity,category:item.category};
    const src=backupText(item.src,50);if(/^[sb]\d+$/.test(src))duty.src=src;
    return normaliseEffort(duty);
  });

  const shopping=backupArray(raw.shopping,BACKUP_LIMITS.maxCategories,true).map(category=>{
    if(!isBackupRecord(category))backupFailure();backupId(category.id);
    const items=backupArray(category.items,BACKUP_LIMITS.maxShoppingItems,true).map(item=>{
      if(!isBackupRecord(item))backupFailure();backupId(item.id);shoppingItemCount+=1;if(shoppingItemCount>BACKUP_LIMITS.maxShoppingItems)backupFailure();
      if(item.status!==undefined&&!['stock','low','needed'].includes(item.status))backupFailure();
      return {id:freshId(),name:backupText(item.name,BACKUP_LIMITS.maxText,true),source:backupText(item.source,BACKUP_LIMITS.maxNotes),
        status:item.status||"stock",quantity:backupText(item.quantity)};
    });
    return {id:freshId(),name:backupText(category.name,BACKUP_LIMITS.maxText,true),items};
  });

  const mealMap=new Map();
  const meals=backupArray(raw.meals,BACKUP_LIMITS.maxMeals,true).map(item=>{
    if(!isBackupRecord(item))backupFailure();const oldId=backupId(item.id);if(mealMap.has(oldId))backupFailure();
    const meal={id:freshId(),name:backupText(item.name,BACKUP_LIMITS.maxText,true),ingredients:backupText(item.ingredients,BACKUP_LIMITS.maxNotes),notes:backupText(item.notes,BACKUP_LIMITS.maxNotes)};
    mealMap.set(oldId,meal.id);return meal;
  });
  const rawMealPlan=raw.mealPlan===undefined?emptyMealPlan():backupArray(raw.mealPlan,7);
  if(rawMealPlan.length!==7)backupFailure();
  const mealPlan=rawMealPlan.map(day=>{
    if(!isBackupRecord(day))backupFailure();
    const slot=value=>backupReference(value,mealMap);
    return {breakfast:slot(day.breakfast),lunch:slot(day.lunch),dinner:slot(day.dinner)};
  });

  const measurements=backupArray(raw.measurements,BACKUP_LIMITS.maxTables,true).map(table=>{
    if(!isBackupRecord(table))backupFailure();backupId(table.id);
    const columnMap=new Map();
    const columns=backupArray(table.columns,BACKUP_LIMITS.maxColumns,true).map(column=>{
      if(!isBackupRecord(column))backupFailure();const oldId=backupId(column.id);if(columnMap.has(oldId))backupFailure();
      if(column.type!==undefined&&!['text','date'].includes(column.type))backupFailure();
      const clean={id:freshId(),label:backupText(column.label,BACKUP_LIMITS.maxText,true),type:column.type||"text"};columnMap.set(oldId,clean.id);return clean;
    });
    const rows=backupArray(table.rows,BACKUP_LIMITS.maxTableRows,true).map(row=>{
      if(!isBackupRecord(row)||!isBackupRecord(row.values))backupFailure();backupId(row.id);measurementRowCount+=1;if(measurementRowCount>BACKUP_LIMITS.maxRows)backupFailure();
      const values={};for(const [oldId,newId] of columnMap)values[newId]=backupText(row.values[oldId],BACKUP_LIMITS.maxNotes);
      return {id:freshId(),values};
    });
    return {id:freshId(),name:backupText(table.name,BACKUP_LIMITS.maxText,true),columns,rows};
  });

  const type=typeof raw.type==="string"&&Object.hasOwn(TYPES,raw.type)?raw.type:"other";
  return {state:{type,customLabel:backupText(raw.customLabel),recipient:backupText(raw.recipient),roles,duties,shopping,meals,mealPlan,measurements},nextUid:nextId};
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "care-plan.json";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
async function importJSON(input){
  const file = input.files && input.files[0];
  if(!file) return;
  if(Number.isFinite(file.size)&&file.size>BACKUP_LIMITS.maxBytes){await uiAlert(t("alertBadFile"));input.value="";return}
  const fr = new FileReader();
  fr.onload = async () => {
    try {
      if(typeof fr.result!=="string"||fr.result.length>BACKUP_LIMITS.maxBytes)backupFailure();
      const imported=sanitizeBackupState(JSON.parse(fr.result));
      state=imported.state;uid=imported.nextUid;
      document.getElementById("recip").value = state.recipient;
      document.getElementById("customLabel").value = state.customLabel;
      autoContent = null;
      setBuilderStarted(true);
      cancelRole(); cancelDuty(); cancelShoppingItemEdit(); cancelMealEdit(); render();
    } catch(e){
      await uiAlert(t("alertBadFile"));
    }
    input.value = "";
  };
  fr.onerror=async()=>{await uiAlert(t("alertBadFile"));input.value=""};
  fr.readAsText(file);
}
